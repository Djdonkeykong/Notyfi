name: Notyfi
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.djdonkeykong.notely
    CURRENT_PROJECT_VERSION: 1
    VERSIONING_SYSTEM: apple-generic
    MARKETING_VERSION: 1.0
    ASSETCATALOG_COMPILER_APPICON_NAME: NotyfiAppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.0.0
  RevenueCatUI:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.0.0
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: 8.0.0

targets:
  Notyfi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    sources:
      - path: App
      - path: Components
      - path: Core
      - path: DesignSystem
      - path: Features
      - path: Models
      - path: Resources
      - path: Shared
      - path: Services
      - path: ViewModels
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Notyfi
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: Notyfi uses the camera so you can turn bills, receipts, and confirmations into money notes.
        NSMicrophoneUsageDescription: Notyfi uses the microphone so you can dictate money notes.
        NSPhotoLibraryUsageDescription: Notyfi can read a photo from your library so you can turn bills, receipts, and confirmations into money notes.
        NSSpeechRecognitionUsageDescription: Notyfi uses speech recognition so you can dictate money notes.
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.216447990819-4avsmvn10s1uejikf59dlu0taiqpalka
    dependencies:
      - target: NotyfiWidget
        embed: true
        link: false
      - package: RevenueCat
      - package: RevenueCatUI
      - package: Supabase
        product: Supabase
      - package: Supabase
        product: Auth
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: NotyfiAppIcon
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_ENTITLEMENTS: Config/Notyfi.entitlements
  NotyfiWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NotyfiWidget
      - path: Shared
      - path: Core/Extensions/Double+Currency.swift
      - path: Resources/Assets.xcassets
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: NotyfiAppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.djdonkeykong.notely.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: NotyfiWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/NotyfiWidget.entitlements
        SKIP_INSTALL: YES
