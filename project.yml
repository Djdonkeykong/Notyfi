name: Notyfi
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.djdonkeykong.notely
    CURRENT_PROJECT_VERSION: 1
    VERSIONING_SYSTEM: apple-generic
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: NO
    INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    INFOPLIST_KEY_CFBundleDisplayName: Notyfi
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
targets:
  Notyfi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    sources:
      - path: App
      - path: Components
      - path: Core
      - path: DesignSystem
      - path: Features
      - path: Models
      - path: Resources
      - path: Services
      - path: ViewModels
    settings:
      base:
        INFOPLIST_KEY_OPENAI_API_KEY: $(OPENAI_API_KEY)
        TARGETED_DEVICE_FAMILY: 1
