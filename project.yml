name: Notyfi
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.djdonkeykong.notely
    CURRENT_PROJECT_VERSION: 1
    VERSIONING_SYSTEM: apple-generic
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: NO
    INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    INFOPLIST_KEY_CFBundleDisplayName: Notyfi
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
targets:
  Notyfi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    sources:
      - path: App
      - path: Components
      - path: Core
      - path: DesignSystem
      - path: Features
      - path: Models
      - path: Resources
      - path: Shared
      - path: Services
      - path: ViewModels
    dependencies:
      - target: NotyfiWidget
        embed: true
        link: false
    settings:
      base:
        INFOPLIST_KEY_OPENAI_API_KEY: $(OPENAI_API_KEY)
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_ENTITLEMENTS: Config/Notyfi.entitlements
  NotyfiWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NotyfiWidget
      - path: Shared
      - path: Core/Extensions/Double+Currency.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.djdonkeykong.notely.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: NotyfiWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/NotyfiWidget.entitlements
        SKIP_INSTALL: YES
