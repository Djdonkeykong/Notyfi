workflows:
  ios-testflight:
    name: Notyfi TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Snaplook Codemagic

    environment:
      groups:
        - dev-test
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.djdonkeykong.notely
      vars:
        APP_STORE_BUILD_NUMBER_OFFSET: "50"
        BUNDLE_ID: "com.djdonkeykong.notely"
        XCODE_PROJECT: "Notyfi.xcodeproj"
        XCODE_SCHEME: "Notyfi"
      xcode: latest

    scripts:
      - name: Write secrets xcconfig
        script: |
          mkdir -p "$CM_BUILD_DIR/Config"
          printf 'SUPABASE_URL = https://uupftsuexunuwsdejxrh.supabase.co\nSUPABASE_ANON_KEY = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1cGZ0c3VleHVudXdzZGVqeHJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDk4MTQsImV4cCI6MjA5MTMyNTgxNH0.8mGjFrMj2bqyZuyrQIDcBsYlp7uXITLMyWSXqj-thQ8\n' > "$CM_BUILD_DIR/Config/Secrets.xcconfig"

      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Verify localizations
        script: |
          cd "$CM_BUILD_DIR"
          python3 scripts/check_localizations.py

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Apply App Store signing profiles
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT"

      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR"
          NEXT_BUILD_NUMBER=$(($PROJECT_BUILD_NUMBER + $APP_STORE_BUILD_NUMBER_OFFSET))
          echo "Setting build number to $NEXT_BUILD_NUMBER"
          agvtool new-version -all "$NEXT_BUILD_NUMBER"

      - name: Build signed IPA
        script: |
          set +e
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
          BUILD_EXIT_CODE=$?

          if [ "$BUILD_EXIT_CODE" -ne 0 ]; then
            echo "Build failed. Extracting error lines from xcodebuild logs..."
            if ls /tmp/xcodebuild_logs/*.log >/dev/null 2>&1; then
              grep -R -n " error: " /tmp/xcodebuild_logs/*.log || true
              echo "Last 200 lines from the most recent xcodebuild log:"
              tail -n 200 "$(ls -t /tmp/xcodebuild_logs/*.log | head -n 1)" || true
            fi
            exit "$BUILD_EXIT_CODE"
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration

